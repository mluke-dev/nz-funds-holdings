name: Extract fund holdings

on:
  workflow_dispatch:    # manual trigger only — click "Run workflow" in the Actions tab

permissions:
  contents: write       # needed so the workflow can commit results back to the repo

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Extract holdings
        run: |
          python extract_holdings.py

      - name: Build HTML dashboard
        run: |
          python build_dashboard.py

      - name: Upload outputs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: holdings-${{ github.run_number }}
          path: |
            data/holdings_clean.csv
            data/holdings_matrix.xlsx
            data/dashboard.html
            data/unmatched.csv
            data/extract_log.txt
            data/holdings_raw/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit results back to repo
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update holdings data ($(date -u +%Y-%m-%d))"
            git push
          fi
